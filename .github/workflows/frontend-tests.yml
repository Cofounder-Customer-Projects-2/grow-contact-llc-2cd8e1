name: Frontend Tests

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  frontend-tests:
    name: frontend-tests
    runs-on: ["self-hosted", "linux", "superoptimizers", "frontend-tests"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (if configured)
        run: |
          if node -e "const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8')); process.exit(pkg.scripts?.test ? 0 : 1);"; then
            npm run test
          else
            echo "No test script in package.json, skipping"
          fi
