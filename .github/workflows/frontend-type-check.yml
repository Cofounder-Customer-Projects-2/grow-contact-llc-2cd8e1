name: Frontend Type Check

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  frontend-type-check:
    name: frontend-type-check
    runs-on: ["self-hosted", "linux", "superoptimizers", "frontend-type-check"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run build gate
        run: npm run build
